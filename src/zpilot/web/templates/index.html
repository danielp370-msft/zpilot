            const name = focusedSessions[0];
            if (!name) return;
            fetch(`/api/session/${encodeURIComponent(name)}/adopt`, { method: 'POST' })
                .catch(e => console.error('Adopt failed:', e));
        }
        window.adoptFocused = adoptFocused;

        // ══════════════════════════════════════════
        // ATTENTION SYSTEM
        // ══════════════════════════════════════════
        function triggerAttention(name) {
            attentionSet.add(name);
            clearTimeout(attentionTimers[name]);
            attentionTimers[name] = setTimeout(() => {
                // Remove animation class after 3s but keep sort priority until focused
                const pill = document.querySelector(`.dock-pill[data-session="${name}"]`);
                if (pill) pill.classList.remove('attention');
            }, 3000);
            renderDock();
        }

        // ══════════════════════════════════════════
        // xterm.js TERMINAL MANAGEMENT
        // ══════════════════════════════════════════
        function createTerminal(name) {
            if (terminals[name]) return terminals[name];

            const term = new Terminal({
                theme: {
                    background: '#010409', foreground: '#c8d3de', cursor: '#3fb950',
                    cursorAccent: '#010409', selectionBackground: 'rgba(88,166,255,0.3)',
                    black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
                    blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d353', white: '#b1bac4',
                    brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
                    brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
                    brightCyan: '#56d364', brightWhite: '#f0f6fc',
                },
                fontFamily: "'SF Mono', 'Cascadia Code', 'Fira Code', monospace",
                fontSize: 13, lineHeight: 1.0, cursorBlink: true, cursorStyle: 'block',
                scrollback: 5000, allowProposedApi: true,
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            terminals[name] = term;
            termFitAddons[name] = fitAddon;

            term.onData((data) => {
                const ws = termSockets[name];
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'input', data: data }));
                }
            });

            term.onResize(({ cols, rows }) => {
                const last = termLastSize[name];
                if (last && last.cols === cols && last.rows === rows) return;
                termLastSize[name] = { cols, rows };
                const ws = termSockets[name];
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
            });

            // Apply current theme bg
            const termBg = getComputedStyle(document.documentElement).getPropertyValue('--term-bg').trim();
            if (termBg) term.options.theme = Object.assign({}, term.options.theme, { background: termBg });

            return term;
        }

        function connectTerminalWS(name) {
            if (termSockets[name]) {
                if (termSockets[name].readyState === WebSocket.OPEN ||
                    termSockets[name].readyState === WebSocket.CONNECTING) return;
            }
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Use raw PTY stream — much lower latency than poll-based /ws/terminal/
            const ws = new WebSocket(`${proto}//${location.host}/ws/pty/${name}`);
            ws.binaryType = 'arraybuffer';
            termSockets[name] = ws;

            ws.onopen = () => {
                wsRetryDelay[name] = 1000;
                // Send current terminal size now that WS is open
                const term = terminals[name];
                if (term) {
                    const cols = term.cols, rows = term.rows;
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                    termLastSize[name] = { cols, rows };
                }
            };

            ws.onmessage = (e) => {
                const term = terminals[name];
                if (!term) return;
                if (e.data instanceof ArrayBuffer) {
                    // Binary frame — raw PTY bytes, write directly to xterm
                    const text = new TextDecoder().decode(e.data);
                    term.write(text);
                } else {
                    // Text frame — could be JSON error/status or fallback
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'output') {
                            term.write('\x1b[2J\x1b[H' + msg.data);
                        } else if (msg.type === 'append') {
                            term.write(msg.data);
                        } else if (msg.type === 'error') {
                            term.write('\r\n\x1b[31m[error] ' + (msg.data || '') + '\x1b[0m\r\n');
                        }
                    } catch (err) {
                        term.write(e.data);
                    }
                }
            };

            ws.onclose = () => {
                const delay = wsRetryDelay[name] || 1000;
                setTimeout(() => {
                    if (focusedSessions.includes(name)) connectTerminalWS(name);
                }, delay);
                wsRetryDelay[name] = Math.min(delay * 2, 30000);
            };

            ws.onerror = (e) => { console.error(`[zpilot] WS error: ${name}`, e); };
        }

        function destroyTerminal(name) {
            if (termSockets[name]) { termSockets[name].close(); delete termSockets[name]; }
            delete wsRetryDelay[name];
            if (terminals[name]) { terminals[name].dispose(); delete terminals[name]; }
            if (termFitAddons[name]) { delete termFitAddons[name]; }
            delete termLastSize[name];
        }

        // Track last Fit dimensions per terminal for auto scale capture
        let fitDimensions = {};  // name → {cols, rows}

        function fitTerminal(name) {
            const fa = termFitAddons[name];
            const term = terminals[name];
            if (!fa || !term || !term.element) return;
            const body = term.element.closest('.term-body');
            if (!body) return;

            if (settings.termMode === 'scale') {
                // Determine target cols/rows
                let cols = 80, rows = 24;
                if (settings.scaleSize === 'auto') {
                    // Use captured Fit dimensions (or fall back to 80x24)
                    const cap = fitDimensions[name];
                    if (cap) { cols = cap.cols; rows = cap.rows; }
                } else {
                    const [c, r] = settings.scaleSize.split('x').map(Number);
                    if (c > 0 && r > 0) { cols = c; rows = r; }
                }
                // Scale mode: fixed cols×rows, CSS-scaled to fill container
                body.classList.add('scale-mode');
                const xtermEl = body.querySelector('.xterm');
                if (!xtermEl) return;
                xtermEl.style.transform = '';
                xtermEl.style.width = '';
                xtermEl.style.height = '';
                try { term.resize(cols, rows); } catch(e) {}
                requestAnimationFrame(() => {
                    const cw = body.clientWidth, ch = body.clientHeight;
                    const tw = xtermEl.offsetWidth;
                    const th = xtermEl.offsetHeight;
                    if (tw > 0 && th > 0) {
                        const scale = Math.min(cw / tw, ch / th);
                        xtermEl.style.transform = `scale(${scale})`;
                        xtermEl.style.width = tw + 'px';
                        xtermEl.style.height = th + 'px';
                    }
                    updateScaleSizeInfo(cols, rows);
                });
            } else {
                // Fit mode: auto rows/cols to fill container
                body.classList.remove('scale-mode');
                const xtermEl = body.querySelector('.xterm');
                if (xtermEl) {
                    xtermEl.style.transform = '';
                    xtermEl.style.width = '';
                    xtermEl.style.height = '';
                }
                try { fa.fit(); } catch(e) {}
                // Capture dimensions for auto scale
                fitDimensions[name] = { cols: term.cols, rows: term.rows };
            }
        }

        function setTermMode(mode) {
            // If switching Fit→Scale with auto, capture current Fit dimensions first
            if (mode === 'scale' && settings.termMode === 'fit') {
                focusedSessions.forEach(name => {
                    const term = terminals[name];
                    if (term) fitDimensions[name] = { cols: term.cols, rows: term.rows };
                });
            }
            settings.termMode = mode;
            document.querySelectorAll('.term-mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.m === mode);
            });
            // Show/hide scale size options
            const row = document.getElementById('scale-size-row');
            if (row) row.style.display = mode === 'scale' ? '' : 'none';
            // Re-fit all visible terminals
            focusedSessions.forEach(name => fitTerminal(name));
            saveSettings();
        }

        function setScaleSize(sz) {
            settings.scaleSize = sz;
            document.querySelectorAll('.scale-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.sz === sz);
            });
            focusedSessions.forEach(name => fitTerminal(name));
            saveSettings();
        }
        window.setScaleSize = setScaleSize;

        function updateScaleSizeInfo(cols, rows) {
            const el = document.getElementById('scale-size-info');
            if (el) el.textContent = `${cols}×${rows} scaled`;
        }

        // ══════════════════════════════════════════
        // SSE CONNECTION
        // ══════════════════════════════════════════
        let sseRetryDelay = 1000;
        let sseFailCount = 0;
        let lastSSEData = Date.now();
        function showDisconnected(msg) {
            document.getElementById('sse-dot').className = 'sse-dot';
            document.getElementById('sse-label').textContent = 'Disconnected';
            document.getElementById('disconnect-overlay').classList.add('visible');
            document.getElementById('disco-retry').textContent = msg || 'Reconnecting…';
        }
        function showConnected() {
            document.getElementById('sse-dot').className = 'sse-dot live';
            document.getElementById('disconnect-overlay').classList.remove('visible');
            // Show mesh status: count nodes
            const localCount = sessionsList.filter(s => !s.node || s.node === 'local').length;
            const remoteNodes = new Set(sessionsList.filter(s => s.node && s.node !== 'local').map(s => s.node));
            const nodeCount = 1 + remoteNodes.size;  // local + remotes
            const remoteCount = sessionsList.filter(s => s.node && s.node !== 'local').length;
            let label = `Local · ${localCount} sessions`;
            if (remoteNodes.size > 0) {
                label = `${nodeCount} nodes · ${localCount + remoteCount} sessions`;
            }
            document.getElementById('sse-label').textContent = label;
        }
        function connectSSE() {
            const src = new EventSource('/api/stream');

            src.addEventListener('status', (e) => {
                lastSSEData = Date.now();
                const sessions = JSON.parse(e.data);
                const oldStates = {};
                sessionsList.forEach(s => oldStates[s.name] = s.state);

                // Un-dismiss sessions that came back alive; keep dismissed exited ones hidden
                sessions.forEach(s => {
                    if (dismissedSet.has(s.name) && s.state !== 'exited') {
                        dismissedSet.delete(s.name);
                    }
                });
                const visible = sessions.filter(s => !dismissedSet.has(s.name));

                visible.sort((a, b) => a.name.localeCompare(b.name));
                sessionsList = visible;
                sessionsData = {};
                visible.forEach(s => {
                    sessionsData[s.name] = s;
                    if (oldStates[s.name] !== undefined && oldStates[s.name] !== s.state) {
                        if (!focusedSessions.includes(s.name)) {
                            triggerAttention(s.name);
                        }
                    }
                });

                // Update focus header if it's showing
                if (focusedSessions.length > 0) {
                    const ps = sessionsData[focusedSessions[0]];
                    if (ps) {
                        const phc = heatColor(ps.heat);
                        const fhDot = document.getElementById('fh-dot');
                        fhDot.className = 'fh-dot ' + dotClass(ps.state);
                        if (phc && ps.state !== 'error' && ps.state !== 'exited') fhDot.style.background = phc;
                        else fhDot.style.background = '';
                        document.getElementById('fh-state').textContent = ps.state || 'unknown';
                        document.getElementById('fh-idle').textContent = 'idle ' + formatIdle(ps.idle_seconds);
                        const heatEl = document.getElementById('fh-heat');
                        if (ps.heat != null) {
                            const pct = Math.round(ps.heat * 100);
                            heatEl.textContent = `🌡${pct}%`;
                            heatEl.style.color = phc || '';
                        }
                        document.getElementById('fh-unmanaged').style.display = ps.managed ? 'none' : '';
                    }
                    // If focused session disappeared, unfocus
                    focusedSessions = focusedSessions.filter(n => sessionsData[n]);
                    if (focusedSessions.length === 0) renderFocus();
                }

                renderDock();
                document.getElementById('settings-count').textContent = sessions.length + ' sessions';
                if (exposeOpen) renderExpose();
                if (mcMode > 0) renderMCCards();
                showConnected();  // update mesh status counts
                sseRetryDelay = 1000;
            });

            src.onmessage = (e) => {
                // "message" events are state change events
                try {
                    const ev = JSON.parse(e.data);
                    if (ev.session && ev.new_state) {
                        if (!focusedSessions.includes(ev.session)) {
                            triggerAttention(ev.session);
                        }
                    }
                } catch(err) {}
            };

            src.onerror = () => {
                src.close();
                sseFailCount++;
                const nextSec = Math.round(sseRetryDelay / 1000);
                showDisconnected(`Retry ${sseFailCount} in ${nextSec}s…`);
                setTimeout(connectSSE, sseRetryDelay);
                sseRetryDelay = Math.min(sseRetryDelay * 2, 30000);
            };

            src.onopen = () => {
                lastSSEData = Date.now();
                sseFailCount = 0;
                sseRetryDelay = 1000;
                showConnected();
            };
        }

        // Heartbeat: detect silently-dead SSE (e.g. TCP half-open)
        setInterval(() => {
            if (Date.now() - lastSSEData > 10000) {
                showDisconnected('Connection lost — waiting for backend…');
            }
        }, 3000);

        // ══════════════════════════════════════════
        // KEYBOARD SHORTCUTS
        // ══════════════════════════════════════════
        document.addEventListener('keydown', (e) => {
            // Alt+1-9: focus session by dock position
            if (e.altKey && e.key >= '1' && e.key <= '9') {
                e.preventDefault();
                const idx = parseInt(e.key) - 1;
                const pills = document.querySelectorAll('.dock-pill');
                if (pills[idx]) {
                    const name = pills[idx].dataset.session;
                    if (name) focusSession(name);
                }
                return;
            }
            // Alt+E or Ctrl+Shift+E: toggle exposé
            if ((e.altKey && e.key.toLowerCase() === 'e') ||
                (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'e')) {
                e.preventDefault();
                toggleExpose();
                return;
            }
            // Alt+S: toggle split
            if (e.altKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                toggleSplit();
                return;
            }
            // Escape: close exposé or settings
            if (e.key === 'Escape') {
                if (exposeOpen) { toggleExpose(); return; }
                const dd = document.getElementById('settings-dropdown');
                if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
                const ctx = document.getElementById('ctx-menu');
                if (ctx.classList.contains('visible')) { ctx.classList.remove('visible'); return; }
                cancelCreate();
            }
        });

        // ══════════════════════════════════════════
        // RESIZE HANDLER
        // ══════════════════════════════════════════
        window.addEventListener('resize', () => {
            focusedSessions.forEach(name => fitTerminal(name));
        });
        // ResizeObserver for container-level resize (split toggle, etc.)
        const focusPanels = document.getElementById('focus-panels');
        if (focusPanels && typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(() => {
                focusedSessions.forEach(name => fitTerminal(name));
            }).observe(focusPanels);
        }

        // ══════════════════════════════════════════
        // INITIALIZATION
        // ══════════════════════════════════════════
        const initialSessions = {{ sessions | tojson }};
        const initialEvents = {{ events | tojson }};

        // Populate state
        initialSessions.forEach(s => { sessionsData[s.name] = s; });
        sessionsList = initialSessions.sort((a, b) => a.name.localeCompare(b.name));

        // Restore settings
        setTheme(settings.theme);
        setTermMode(settings.termMode || 'fit');
        setScaleSize(settings.scaleSize || 'auto');
        splitMode = !!settings.split;
        if (splitMode) document.getElementById('btn-split').classList.add('active');
        // Restore group-by-node checkbox
        const gbnCheck = document.getElementById('group-by-node');
        if (gbnCheck) gbnCheck.checked = !!settings.groupByNode;

        // Restore focused session(s) from localStorage or auto-pick first
        if (settings.focused && sessionsData[settings.focused]) {
            focusedSessions = [settings.focused];
            if (splitMode && settings.focused2 && sessionsData[settings.focused2]) {
                focusedSessions.push(settings.focused2);
            }
        } else if (sessionsList.length > 0) {
            focusedSessions = [sessionsList[0].name];
        }

        renderDock();
        renderFocus();

        if (settings.expose) {
            // Defer expose open to after first render
            setTimeout(() => toggleExpose(), 100);
        }

        // Start SSE
        if (document.readyState === 'complete') connectSSE();
        else window.addEventListener('load', connectSSE);

        document.getElementById('settings-count').textContent = sessionsList.length + ' sessions';

    })();
    </script>
    <div class="disconnect-overlay" id="disconnect-overlay">
        <span class="disco-icon">⚡</span>
        <span class="disco-title">DISCONNECTED</span>
        <span class="disco-sub">zpilot backend is unreachable</span>
        <span class="disco-retry" id="disco-retry">Reconnecting…</span>
    </div>
</body>
</html>
